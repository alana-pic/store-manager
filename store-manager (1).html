<style>
:root{--ink:#0f1923;--muted:#6b7c93;--subtle:#e8ecf0;--surface:#f4f6f8;--white:#fff;--green:#00875a;--green-bg:#e3f5ee;--amber:#b45309;--amber-bg:#fef3c7;--blue:#1d4ed8;--blue-bg:#dbeafe;--red:#b91c1c;--red-bg:#fee2e2;--violet:#6d28d9;--violet-bg:#ede9fe;--slate:#475569;--slate-bg:#f1f5f9;--orange:#c2410c;--orange-bg:#ffedd5;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--ink);display:flex;align-items:center;height:52px;padding:0 20px;flex-shrink:0;gap:0;}
.logo{font-family:'Playfair Display',serif;color:white;font-size:16px;font-weight:700;margin-right:22px;white-space:nowrap;}
.logo-dot{color:#f59e0b;}
nav{display:flex;gap:2px;}
.nav-btn{padding:5px 13px;border-radius:6px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;background:transparent;color:#94a3b8;transition:all .15s;white-space:nowrap;position:relative;}
.nav-btn:hover{color:white;}
.nav-btn.active{background:rgba(255,255,255,.13);color:white;}
.pbadge{position:absolute;top:2px;right:2px;background:#ef4444;color:white;font-size:9px;font-weight:700;border-radius:10px;padding:0 4px;min-width:14px;text-align:center;line-height:14px;}
.hright{margin-left:auto;display:flex;align-items:center;gap:8px;flex-shrink:0;}
.hstat{color:#94a3b8;font-size:12px;white-space:nowrap;}
.hstat span{color:white;font-weight:600;}
.sync-btn{display:flex;align-items:center;gap:5px;cursor:pointer;padding:5px 10px;border-radius:6px;border:1px solid rgba(255,255,255,.3);background:rgba(255,255,255,.1);color:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.sync-btn:hover{background:rgba(255,255,255,.08);color:white;}
.sdot{width:7px;height:7px;border-radius:50%;background:#94a3b8;flex-shrink:0;}
.sdot.ok{background:#34d399;}
.sdot.busy{background:#f59e0b;animation:pulse 1s infinite;}
.sdot.err{background:#f87171;}
.team-sel{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:white;font-family:'DM Sans',sans-serif;font-size:12px;padding:4px 8px;border-radius:6px;cursor:pointer;outline:none;}
.team-sel option{background:#1e293b;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.sync-btn{display:flex!important;align-items:center;gap:5px;cursor:pointer;padding:6px 12px;border-radius:6px;border:1px solid rgba(255,255,255,.35)!important;background:rgba(255,255,255,.12)!important;color:white!important;font-family:"DM Sans",sans-serif;font-size:12px;font-weight:600;transition:all .2s;white-space:nowrap;flex-shrink:0;}
.sync-btn:hover{background:rgba(255,255,255,.22)!important;}
@media(max-width:960px){.hstat{display:none;}.team-sel{max-width:120px;}}
.app-body{display:flex;flex:1;overflow:hidden;}
.sidebar{width:218px;background:white;border-right:1px solid var(--subtle);display:flex;flex-direction:column;flex-shrink:0;}
.sb-sec{padding:12px;border-bottom:1px solid var(--subtle);}
.sb-sec.grow{flex:1;overflow:auto;}
.sb-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px;}
.sw{position:relative;}
.sw input{width:100%;padding:7px 10px 7px 28px;border:1px solid var(--subtle);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;background:var(--surface);}
.sw input:focus{border-color:#94a3b8;background:white;}
.sw::before{content:"⌕";position:absolute;left:8px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:15px;pointer-events:none;}
.fl{display:flex;flex-direction:column;gap:2px;}
.fi{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;border-radius:6px;cursor:pointer;transition:background .1s;font-size:13px;}
.fi:hover{background:var(--surface);}
.fi.active{background:var(--ink);color:white;}
.fi.active .fc{background:rgba(255,255,255,.2);color:white;}
.fc{background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;padding:1px 6px;border-radius:20px;}
.main{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.toolbar{background:white;border-bottom:1px solid var(--subtle);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.ttitle{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-right:auto;}
.cpill{background:var(--surface);color:var(--muted);font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;font-family:'DM Sans',sans-serif;}
.tw{flex:1;overflow:auto;}
table{width:100%;border-collapse:collapse;}
thead{position:sticky;top:0;z-index:1;}
thead tr{background:var(--surface);border-bottom:2px solid var(--subtle);}
th{padding:8px 13px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);text-align:left;white-space:nowrap;}
tbody tr{border-bottom:1px solid var(--subtle);cursor:pointer;transition:background .1s;}
tbody tr:hover{background:#f0f7ff;}
tbody tr.sel{background:#e8f0fe!important;}
td{padding:10px 13px;font-size:13px;vertical-align:middle;}
td.nm{font-weight:600;}
td.mu{color:var(--muted);}
td.tr2{max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--muted);font-size:12px;}
.empty-msg{text-align:center;padding:60px;color:var(--muted);font-size:14px;}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap;}
.bg-green{background:var(--green-bg);color:var(--green);}
.bg-amber{background:var(--amber-bg);color:var(--amber);}
.bg-blue{background:var(--blue-bg);color:var(--blue);}
.bg-red{background:var(--red-bg);color:var(--red);}
.bg-violet{background:var(--violet-bg);color:var(--violet);}
.bg-slate{background:var(--slate-bg);color:var(--slate);}
.detail{width:0;background:white;border-left:1px solid var(--subtle);overflow:hidden;transition:width .2s ease;flex-shrink:0;display:flex;flex-direction:column;}
.detail.open{width:360px;overflow-y:auto;}
.di{padding:20px;min-width:360px;}
.dname{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;line-height:1.2;margin-bottom:7px;}
.dacts{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.btn{padding:6px 13px;border-radius:7px;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;text-decoration:none;display:inline-block;}
.btn-ink{background:var(--ink);color:white;}
.btn-ghost{background:var(--surface);color:var(--muted);}
.btn-ghost:hover{color:var(--ink);}
.btn-green{background:var(--green);color:white;}
.btn-close{margin-left:auto;background:none;border:none;font-size:20px;color:var(--muted);cursor:pointer;padding:2px 5px;line-height:1;}
.btn-close:hover{color:var(--ink);}
.divider{border:none;border-top:1px solid var(--subtle);margin:13px 0;}
.fg{margin-bottom:12px;}
.fl-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:3px;}
.fv{font-size:13px;color:var(--ink);line-height:1.5;}
.fv a{color:var(--blue);text-decoration:none;}
.fv a:hover{text-decoration:underline;}
.fv.em{color:#cbd5e1;}
.fi-input{width:100%;padding:7px 9px;border:1px solid var(--subtle);border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;color:var(--ink);outline:none;}
.fi-input:focus{border-color:#94a3b8;}
textarea.fi-input{height:78px;resize:vertical;}
select.fi-input{cursor:pointer;}
.notes-box{background:var(--surface);border-radius:8px;padding:11px;font-size:13px;line-height:1.6;}
.log-entry{padding:8px 0;border-bottom:1px solid var(--subtle);font-size:12px;}
.log-entry:last-child{border-bottom:none;}
.log-who{font-weight:600;}
.log-when{color:var(--muted);font-size:11px;}
.log-note{color:var(--slate);margin-top:3px;line-height:1.4;}
.ov-wrap{flex:1;overflow:auto;padding:22px;}
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:22px;}
.sc{background:white;border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-top:3px solid transparent;}
.sn{font-family:'Playfair Display',serif;font-size:32px;font-weight:800;line-height:1;margin-bottom:4px;}
.sl{font-size:13px;font-weight:500;color:var(--muted);}
.ss{font-size:11px;color:#cbd5e1;margin-top:2px;}
.ov-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.oc{background:white;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06);}
.oc.full{grid-column:1/-1;}
.ot{font-size:14px;font-weight:600;margin-bottom:11px;}
.or{padding:9px 0;border-bottom:1px solid var(--subtle);cursor:pointer;}
.or:last-child{border-bottom:none;}
.or:hover .orn{color:var(--blue);}
.orn{font-weight:600;font-size:13px;}
.oro{font-size:12px;color:var(--muted);margin-top:2px;line-height:1.4;}
.stage-chips{display:flex;flex-wrap:wrap;gap:9px;}
.schip{border-radius:10px;padding:10px 13px;text-align:center;cursor:pointer;transition:transform .1s;min-width:90px;}
.schip:hover{transform:translateY(-1px);}
.scn{font-family:'Playfair Display',serif;font-size:24px;font-weight:800;line-height:1;}
.scl{font-size:11px;font-weight:600;margin-top:2px;}
.scs{font-size:10px;opacity:.7;}
.pv-wrap{flex:1;overflow:auto;padding:22px;}
.p-section{margin-bottom:24px;}
.p-sec-title{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;}
.p-card{background:white;border-radius:10px;padding:13px 15px;margin-bottom:7px;cursor:pointer;border-left:4px solid transparent;box-shadow:0 1px 3px rgba(0,0,0,.06);transition:all .15s;}

.p-card.urg{border-left-color:#ef4444;}
.p-card.wrn{border-left-color:#f59e0b;}
.p-card.vlt{border-left-color:#8b5cf6;}
.p-card.inf{border-left-color:#3b82f6;}
.p-name{font-weight:600;font-size:14px;}
.p-reason{font-size:12px;color:var(--muted);margin-top:2px;}
.p-meta{font-size:11px;color:#94a3b8;margin-top:1px;}
.p-acts{display:flex;gap:5px;margin-top:9px;}

.p-btn-email{background:#e3f5ee;color:#00875a;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:flex;align-items:center;justify-content:center;}
.modal{background:white;border-radius:14px;padding:26px;width:460px;max-width:95vw;box-shadow:0 20px 60px rgba(0,0,0,.2);}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;margin-bottom:18px;}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;}
.form-row{margin-bottom:13px;}
.form-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.7px;color:var(--muted);margin-bottom:5px;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px;}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.fade-in{animation:fadeIn .2s ease;}

</head>
<body>
<header>
  <div class="logo">🍑 Store<span class="logo-dot">.</span>Manager</div>

    <button class="nav-btn active" onclick="switchView('overview',this)">Overview</button>
    <button class="nav-btn" onclick="switchView('priorities',this)" id="priNavBtn">Today's Priorities <span class="pbadge" id="priCount">0</span></button>
    <button class="nav-btn" onclick="switchView('accounts',this)">Accounts</button>
    <button class="nav-btn" onclick="switchView('pipeline',this)">Pipeline</button>
  </nav>
  <div class="hright">
    <button class="sync-btn" onclick="syncSheets()"><div class="sdot" id="sdot"></div><span id="syncLbl">Not connected</span></button>
    <select class="team-sel" id="teamSel" onchange="setTeam(this.value)">
      <option value="">👤 Who are you?</option>
      <option>Founder</option><option>Sales Rep 1</option><option>Sales Rep 2</option><option>Operations</option>
    </select>
    <div class="hstat" id="hstatLive"><span id="hLive">—</span> Live</div>
    <div class="hstat" id="hstatUnpaid"><span id="hUnpaid">—</span> Unpaid</div>
    <div class="hstat" id="hstatPipeline"><span id="hPipeline">—</span> Pipeline</div>
  </div>
</header>

<div class="app-body">
  <aside class="sidebar" id="sidebar" style="display:none">
    <div class="sb-sec">
      <div class="sb-lbl">Search</div>
      <div class="sw"><input type="text" id="searchInput" placeholder="Name, buyer, area…" oninput="onSearch()"></div>
    </div>
    <div class="sb-sec grow">
      <div class="sb-lbl" id="filterLabel">Status</div>
      <div class="fl" id="filterList"></div>
    </div>
  </aside>

  <div class="main">
    <div id="tableView" style="display:none;flex:1;flex-direction:column;overflow:hidden;">
      <div class="toolbar">
        <div class="ttitle" id="viewTitle">Accounts</div>
        <button class="btn btn-ink" onclick="openLogModal(null)" id="logBtn" style="display:none;font-size:12px;padding:5px 12px;">+ Log Visit</button>
      </div>
      <div class="tw">
        <table><thead id="thead"></thead><tbody id="tbody"></tbody></table>
        <div class="empty-msg" id="emptyMsg" style="display:none">No results found</div>
      </div>
    </div>
    <div id="overviewView" style="display:flex;flex:1;overflow:hidden;"><div class="ov-wrap" id="ovContent"></div></div>
    <div id="prioritiesView" style="display:none;flex:1;overflow:hidden;"><div class="pv-wrap" id="priContent"></div></div>
  </div>

  <div class="detail" id="detailPanel"><div class="di" id="detailContent"></div></div>
</div>

<!-- Log modal -->
<div class="modal-overlay" id="logModal" style="display:none" onclick="if(event.target===this)closeLog()">
  <div class="modal">
    <div class="modal-title">📋 Log Visit / Check-in</div>
    <div class="form-row"><div class="form-label">Store</div><select class="fi-input" id="logStore"></select></div>
    <div class="form-row"><div class="form-label">Outcome</div>
      <select class="fi-input" id="logOutcome">
        <option value="visited">🏪 Store visit</option><option value="called">📞 Called</option>
        <option value="emailed">✉️ Emailed</option><option value="order">📦 Order placed</option>
        <option value="payment">💰 Payment received</option><option value="sample">🎁 Samples dropped</option>
        <option value="noAnswer">📵 No answer</option>
      </select>
    </div>
    <div class="form-row"><div class="form-label">Notes</div><textarea class="fi-input" id="logNote" placeholder="What happened? Any follow-up needed?"></textarea></div>
    <div class="form-row"><div class="form-label">Next Follow-up Date (optional)</div><input type="date" class="fi-input" id="logFollowup"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeLog()">Cancel</button>
      <button class="btn btn-green" onclick="submitLog()">Save Log</button>
    </div>
  </div>
</div>

async function syncSheets(){
  if(!SHEETS_URL){const u=prompt('Paste your Google Apps Script Web App URL:\n\n(See the setup guide below for instructions)');if(!u)return;SHEETS_URL=u.trim();localStorage.setItem('sheetsUrl',SHEETS_URL);}
  setSyncStatus('busy','Syncing…');
  try{
    const res=await fetch(SHEETS_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({accts,prspcts,logs})});
    if(!res.ok)throw new Error('HTTP '+res.status);
    const d=await res.json();
    if(d.accts){accts=d.accts;prspcts=d.prspcts||prspcts;save();}
    setSyncStatus('ok','Synced '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
    updateStats();rerender();
  }catch(e){setSyncStatus('err','Sync failed');console.error(e);}
}

// ── PRIORITIES ────────────────────────────────────────────────────────────
function getPriorities(){
  const items=[];
  accts.forEach(a=>{
    if(!a.paid&&a.initialOrder){const d=dSince(a.initialOrder);if(d!==null&&d>=T.unpaidDays)items.push({urg:'urg',icon:'💸',title:a.name,reason:`Invoice unpaid for ${d} days`,meta:`${a.buyer||'—'} · ${a.payment||'—'}`,email:a.email,phone:a.phone,id:a.id,type:'account'});}
    if(a.lastCheckin){const d=dSince(a.lastCheckin);if(d!==null&&d>=T.noContact&&a.status!=='In Discussion')items.push({urg:'wrn',icon:'📵',title:a.name,reason:`No contact in ${d} days`,meta:`Last: ${fmtD(a.lastCheckin)}`,email:a.email,phone:a.phone,id:a.id,type:'account'});}
    else if(a.status==='Live')items.push({urg:'wrn',icon:'📵',title:a.name,reason:'Never contacted since going Live',meta:'Add a check-in',email:a.email,phone:a.phone,id:a.id,type:'account'});
    if(a.lastOrder){const d=dSince(a.lastOrder);if(d!==null&&d>=T.noReorder)items.push({urg:'inf',icon:'📦',title:a.name,reason:`Last order ${d} days ago — check reorder`,meta:`Order: ${fmtD(a.lastOrder)}`,email:a.email,phone:a.phone,id:a.id,type:'account'});}
    if(a.status==='In Discussion'&&!a.initialOrder&&a.lastCheckin){const d=dSince(a.lastCheckin);if(d!==null&&d>=T.visitedNoSale)items.push({urg:'inf',icon:'🏪',title:a.name,reason:`Visited ${d} days ago — no sale yet`,meta:'Push to convert',email:a.email,phone:a.phone,id:a.id,type:'account'});}
  });
  prspcts.forEach(p=>{
    if(p.stage==='5-Pending Decision'&&p.dateVisited){const d=dSince(p.dateVisited);if(d!==null&&d>=T.pendingDecision)items.push({urg:'vlt',icon:'⏳',title:p.name,reason:`Pending decision for ${d} days`,meta:`${p.area||'—'} · ${p.stores||1} location(s)`,email:p.email,phone:p.phone,id:p.id,type:'prospect'});}
    if(p.stage==='3-In Discussions'&&p.dateVisited){const d=dSince(p.dateVisited);if(d!==null&&d>=T.noContact)items.push({urg:'wrn',icon:'💬',title:p.name,reason:`In discussions for ${d} days`,meta:`${p.buyer||'—'} · ${p.stores||1} location(s)`,email:p.email,phone:p.phone,id:p.id,type:'prospect'});}
    if(p.followupDate&&p.followupDate<=today())items.push({urg:'urg',icon:'📅',title:p.name,reason:`Follow-up due: ${fmtD(p.followupDate)}`,meta:SC[p.stage]?.l||p.stage,email:p.email,phone:p.phone,id:p.id,type:'prospect'});
  });
  const ord={urg:0,wrn:1,vlt:2,inf:3};
  return items.sort((a,b)=>(ord[a.urg]||9)-(ord[b.urg]||9));
}

function renderPriorities(){
  const items=getPriorities();
  document.getElementById('priCount').textContent=items.length;
  const w=document.getElementById('priContent');
  if(!items.length){w.innerHTML=`<div class="no-pri"><div style="font-size:44px;margin-bottom:10px">🎉</div><div style="font-size:18px;font-weight:600;margin-bottom:6px">All caught up!</div><div>No follow-ups needed right now.</div></div>`;return;}
  const grps={urg:[],wrn:[],vlt:[],inf:[]};
  items.forEach(i=>(grps[i.urg]||grps.inf).push(i));
  const secs=[{k:'urg',l:'🔴 Urgent — Do Today',c:'urg'},{k:'wrn',l:'🟡 Overdue Follow-ups',c:'wrn'},{k:'vlt',l:'🟣 Stalled Decisions',c:'vlt'},{k:'inf',l:'🔵 Reorder Checks',c:'inf'}];
  w.innerHTML=`<div style="font-family:'Playfair Display',serif;font-size:22px;font-weight:800;margin-bottom:4px">Today's Priorities</div>
  <div style="font-size:13px;color:var(--muted);margin-bottom:22px">${items.length} item${items.length!==1?'s':''} need attention · ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}</div>

}

  document.getElementById('viewTitle').innerHTML=`Pipeline <span class="cpill">${prspcts.filter(p=>filter==='All'||p.stage===filter).length}</span>`;
  document.getElementById('logBtn').style.display='none';
  document.getElementById('thead').innerHTML=`<tr>${['Store','Stage','Channel','Area','Buyer','Locs','Last Visit','Notes'].map(c=>`<th>${c}</th>`).join('')}</tr>`;
  const rows=prspcts.filter(p=>{
    const ms=!search||[p.name,p.buyer,p.area,p.channel].some(v=>(v||'').toLowerCase().includes(search));
    return ms&&(filter==='All'||p.stage===filter);
  });
  document.getElementById('emptyMsg').style.display=rows.length?'none':'block';
  document.getElementById('tbody').innerHTML=rows.map(p=>`<tr onclick="selPrspct(${p.id})" class="${sel?.id===p.id&&sel?._t==='prspct'?'sel':''}">
    <td class="nm">${esc(p.name)}</td><td>${bdg(p.stage,SC[p.stage])}</td>
    <td class="mu">${esc(p.channel)}</td><td class="mu">${esc(p.area)||'—'}</td>
    <td class="mu">${esc(p.buyer)||'—'}</td><td class="mu" style="text-align:center">${p.stores||'—'}</td>
    <td class="mu">${fmtD(p.dateVisited)}</td><td class="tr2">${esc(p.notes)||'—'}</td>
  </tr>`).join('');
}

// ── SELECT ────────────────────────────────────────────────────────────────
function selAcct(id){sel={...accts.find(a=>a.id===id),_t:'acct'};editing=false;renderDetail();renderAcctTable();}
function selPrspct(id){sel={...prspcts.find(p=>p.id===id),_t:'prspct'};editing=false;renderDetail();renderPrspctTable();}

// ── DETAIL ────────────────────────────────────────────────────────────────
function renderDetail(){
  document.getElementById('detailPanel').classList.add('open');
  const s=sel,isA=s._t==='acct';
  const slogs=logs.filter(l=>l.sid===s.id&&l.st===s._t).slice(-5).reverse();
  const oE={visited:'🏪',called:'📞',emailed:'✉️',order:'📦',payment:'💰',sample:'🎁',noAnswer:'📵'};
  document.getElementById('detailContent').innerHTML=`<div class="fade-in">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;padding-right:8px">
        ${editing?`<input class="fi-input" id="e_name" value="${esc(s.name)}" style="font-size:17px;font-weight:700;margin-bottom:8px">`:`<div class="dname">${esc(s.name)}</div>`}
        ${editing?(isA?`<select class="fi-input" id="e_status" style="width:auto"><option>Live</option><option>Trial</option><option>In Discussion</option></select>`:`<select class="fi-input" id="e_stage" style="width:auto">${Object.keys(SC).map(k=>`<option>${k}</option>`).join('')}</select>`):(isA?bdg(s.status,STC[s.status]):bdg(s.stage,SC[s.stage]))}
      </div>
      <button class="btn-close" onclick="closeDetail()">×</button>
    </div>
    <div class="dacts">
      ${editing?`<button class="btn btn-green" onclick="saveEdit()">Save</button><button class="btn btn-ghost" onclick="cancelEdit()">Cancel</button>`
        :`<button class="btn btn-ink" onclick="startEdit()">Edit</button>
          <button class="btn btn-ghost" onclick="openLogFor(${s.id},'${s._t}')">+ Log</button>
          ${s.email?`<a class="btn btn-ghost" href="mailto:${esc(s.email)}" style="text-decoration:none">✉️</a>`:''}
          ${s.phone?`<a class="btn btn-ghost" href="tel:${esc(s.phone)}" style="text-decoration:none">📞</a>`:''}`}
    </div>
    <hr class="divider">
    ${fg('📍 Location',s.location,'e_location')}
    ${fg('👤 Buyer',s.buyer,'e_buyer')}
    ${fgl('✉️ Email',s.email,'e_email','mailto:')}
    ${fg('📞 Phone',s.phone,'e_phone')}
    ${isA?`${fg('📦 Initial Order',s.initialOrder,'e_initialOrder',true)}${fg('🔄 Last Order',s.lastOrder,'e_lastOrder',true)}${fg('💳 Payment',s.payment,'e_payment')}${fg('🔁 Channel',s.channel,'e_channel')}
    <div class="fg"><div class="fl-lbl">💰 Paid</div>${editing?`<select class="fi-input" id="e_paid" style="width:auto"><option value="true">✅ Yes</option><option value="false">⏳ No</option></select>`:`<div class="fv">${s.paid?'✅ Yes':'⏳ Pending'}</div>`}</div>
    ${fg('📅 Last Check-in',s.lastCheckin,'e_lastCheckin',true)}${fg('⏰ Follow-up',s.followupDate,'e_followupDate',true)}`
    :`${fg('🏪 Channel',s.channel,'e_channel')}${fg('🗺️ Area',s.area,'e_area')}${fg('🏬 Locations',s.stores,'e_stores')}${fg('📅 Date Visited',s.dateVisited,'e_dateVisited',true)}${fg('⏰ Follow-up',s.followupDate,'e_followupDate',true)}`}
    <div class="fg"><div class="fl-lbl">📋 Notes</div>${editing?`<textarea class="fi-input" id="e_notes">${esc(s.notes||'')}</textarea>`:`<div class="notes-box ${!s.notes?'fv em':''}">${esc(s.notes)||'No notes'}</div>`}</div>
    ${slogs.length?`<hr class="divider"><div class="fl-lbl" style="margin-bottom:6px">🕐 Activity Log</div>${slogs.map(l=>`<div class="log-entry"><div style="display:flex;justify-content:space-between"><span class="log-who">${esc(l.who||'Team')}</span><span class="log-when">${fmtD(l.date)}</span></div><span class="badge bg-slate" style="margin-top:3px;font-size:10px">${oE[l.outcome]||'📝'} ${esc(l.outcome)}</span><div class="log-note">${esc(l.note)}</div></div>`).join('')}`:''}
  </div>`;
  if(editing){
    if(isA){document.getElementById('e_status').value=s.status;document.getElementById('e_paid').value=String(s.paid);}
    else document.getElementById('e_stage').value=s.stage;
  }
}
const fg=(lbl,val,id,isDate=false)=>editing?`<div class="fg"><div class="fl-lbl">${lbl}</div><input type="${isDate?'date':'text'}" class="fi-input" id="${id}" value="${esc(val||'')}"></div>`:`<div class="fg"><div class="fl-lbl">${lbl}</div><div class="fv ${!val?'em':''}">${esc(val)||'—'}</div></div>`;
const fgl=(lbl,val,id,pfx)=>editing?`<div class="fg"><div class="fl-lbl">${lbl}</div><input class="fi-input" id="${id}" value="${esc(val||'')}"></div>`:`<div class="fg"><div class="fl-lbl">${lbl}</div><div class="fv ${!val?'em':''}">${val?`<a href="${pfx}${esc(val)}">${esc(val)}</a>`:'—'}</div></div>`;
const startEdit=()=>{editing=true;renderDetail();};
const cancelEdit=()=>{editing=false;renderDetail();};
const closeDetail=()=>{sel=null;document.getElementById('detailPanel').classList.remove('open');rerender();};

function saveEdit(){
  const s=sel,isA=s._t==='acct';
  const g=id=>{const el=document.getElementById(id);return el?el.value.trim():null;};
  const base={name:g('e_name')||s.name,buyer:g('e_buyer'),email:g('e_email'),phone:g('e_phone'),location:g('e_location'),notes:g('e_notes'),channel:g('e_channel'),followupDate:g('e_followupDate')};
  if(isA){const u={...s,...base,status:g('e_status')||s.status,initialOrder:g('e_initialOrder'),lastOrder:g('e_lastOrder'),payment:g('e_payment'),lastCheckin:g('e_lastCheckin'),paid:g('e_paid')==='true'};accts=accts.map(a=>a.id===s.id?u:a);sel={...u,_t:'acct'};renderAcctFilters();renderAcctTable();}
  else{const u={...s,...base,stage:g('e_stage')||s.stage,area:g('e_area'),stores:g('e_stores'),dateVisited:g('e_dateVisited')};prspcts=prspcts.map(p=>p.id===s.id?u:p);sel={...u,_t:'prspct'};renderPrspctFilters();renderPrspctTable();}
  editing=false;save();updateStats();renderDetail();
}

// ── LOG ───────────────────────────────────────────────────────────────────
function openLogModal(preId,preType){
  const modal=document.getElementById('logModal');
  const lsel=document.getElementById('logStore');
  const all=[...accts.map(a=>({id:a.id,type:'acct',label:a.name})),...prspcts.map(p=>({id:p.id,type:'prspct',label:p.name+' (prospect)'}))];
  lsel.innerHTML=all.map(s=>`<option value="${s.id}|${s.type}">${esc(s.label)}</option>`).join('');
  if(preId){const t=all.find(s=>s.id===preId&&s.type===preType);if(t)lsel.value=`${preId}|${preType}`;}
  document.getElementById('logNote').value='';
  document.getElementById('logFollowup').value='';
  modal.style.display='flex';
}
function openLogFor(id,type){openLogModal(id,type);}
function closeLog(){document.getElementById('logModal').style.display='none';}
function submitLog(){
  const parts=document.getElementById('logStore').value.split('|');
  const sid=parseInt(parts[0]),st=parts[1];
  const note=document.getElementById('logNote').value.trim();
  const outcome=document.getElementById('logOutcome').value;
  const followup=document.getElementById('logFollowup').value;
  if(!note){alert('Please add a note.');return;}
  const entry={sid,st,outcome,note,date:today(),who:currentTeam||'Team',followupDate:followup||null};
  logs.push(entry);
  if(st==='acct')accts=accts.map(a=>a.id===sid?{...a,lastCheckin:today(),followupDate:followup||a.followupDate}:a);
  else prspcts=prspcts.map(p=>p.id===sid?{...p,dateVisited:today(),followupDate:followup||p.followupDate}:p);
  save();closeLog();updateStats();rerender();
  if(sel?.id===sid){sel=st==='acct'?{...accts.find(a=>a.id===sid),_t:'acct'}:{...prspcts.find(p=>p.id===sid),_t:'prspct'};renderDetail();}
}

// ── SWITCH VIEW ───────────────────────────────────────────────────────────
function switchView(v,btn){
  view=v;search='';filter='All';sel=null;editing=false;
  const si=document.getElementById('searchInput');if(si)si.value='';
  document.getElementById('detailPanel').classList.remove('open');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  ['overviewView','prioritiesView','tableView'].forEach(id=>document.getElementById(id).style.display='none');
  document.getElementById('sidebar').style.display=['accounts','pipeline'].includes(v)?'flex':'none';
  if(v==='overview'){document.getElementById('overviewView').style.display='flex';renderOverview();}
  else if(v==='priorities'){document.getElementById('prioritiesView').style.display='flex';renderPriorities();}
  else if(v==='accounts'){document.getElementById('tableView').style.display='flex';renderAcctFilters();renderAcctTable();}
  else if(v==='pipeline'){document.getElementById('tableView').style.display='flex';renderPrspctFilters();renderPrspctTable();}
}
function rerender(){if(view==='overview')renderOverview();else if(view==='priorities')renderPriorities();else if(view==='accounts')renderAcctTable();else if(view==='pipeline')renderPrspctTable();}
function goPipeline(s){switchView('pipeline');filter=s;renderPrspctFilters();renderPrspctTable();}
function goItem(id,type){if(type==='account'){switchView('accounts',document.querySelectorAll('.nav-btn')[2]);setTimeout(()=>selAcct(id),50);}else{switchView('pipeline',document.querySelectorAll('.nav-btn')[3]);setTimeout(()=>selPrspct(id),50);}}
function updateStats(){
  document.getElementById('hLive').textContent=accts.filter(a=>a.status==='Live').length;
  document.getElementById('hUnpaid').textContent=accts.filter(a=>!a.paid&&(a.status==='Live'||a.status==='Trial')).length;
  document.getElementById('hPipeline').textContent=prspcts.filter(p=>!['7-Closed Lost','6-Closed Won'].includes(p.stage)).length;
  document.getElementById('priCount').textContent=getPriorities().length;
}

// ── INIT ──────────────────────────────────────────────────────────────────
updateStats();
renderOverview();
</script>
</body>
</html>
